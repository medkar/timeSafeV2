[platformio]
default_envs = native

; --- Environnement de test sur PC (aucun matériel requis) ---
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -I lib/domain

; --- Environnement ESP32 (rempli dans le Plan 2 : drivers) ---
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -std=gnu++17
; lib_deps (LVGL, RTClib, …) seront ajoutés au Plan 2.
