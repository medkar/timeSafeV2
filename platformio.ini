[platformio]
default_envs = native

; --- Environnement de test sur PC (aucun matériel requis) ---
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -I lib/domain
    -I lib/hal
    -I lib/config
    -I lib/app
    -I lib/theme

; --- Environnement ESP32 (Plan 2 : drivers) ---
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -I .
    -I lib/theme
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    lvgl/lvgl@^9.2.0
; RTClib sera ajouté à la tâche RTC.
